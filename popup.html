<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpeedKey</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1 class="title" data-key="popup.title">SpeedKey</h1>
      <p class="subtitle" data-key="popup.subtitle">Video Speed Controller</p>
    </div>
    
    <div class="content">
      <div class="current-speed">
        <span class="label" data-key="popup.currentSpeed">Current Speed:</span>
        <span class="speed-value" id="currentSpeedValue">1.0×</span>
      </div>
      
      <div class="speed-control">
        <label class="label" data-key="popup.adjustSpeed">Adjust Speed:</label>
        <div class="slider-container">
          <input type="range" id="speedSlider" min="0.25" max="5" step="0.25" value="2">
          <span class="speed-display" id="speedDisplay">2.0×</span>
        </div>
      </div>
      
      <div class="preset-buttons">
        <button class="preset-btn" data-speed="0.5">0.5×</button>
        <button class="preset-btn" data-speed="1">1×</button>
        <button class="preset-btn" data-speed="1.5">1.5×</button>
        <button class="preset-btn" data-speed="2">2×</button>
        <button class="preset-btn" data-speed="3">3×</button>
      </div>
      
      <div class="trigger-key-section">
        <label class="label" data-key="popup.triggerKey">Trigger Key:</label>
        <select id="triggerKeySelect" class="trigger-select">
          <option value="ShiftLeft">Left Shift</option>
          <option value="ShiftRight">Right Shift</option>
          <option value="ControlLeft">Left Ctrl</option>
          <option value="ControlRight">Right Ctrl</option>
          <option value="AltLeft">Left Alt</option>
          <option value="AltRight">Right Alt</option>
          <option value="Space">Space</option>
          <option value="KeyQ">Q</option>
          <option value="KeyW">W</option>
          <option value="KeyE">E</option>
          <option value="KeyR">R</option>
          <option value="KeyT">T</option>
          <option value="custom">Custom</option>
        </select>
        <div id="customKeyContainer" class="custom-key-container" style="display: none;">
          <input type="text" id="customKeyInput" placeholder="Press a key..." readonly>
        </div>
      </div>
      
      <div class="overlay-toggle">
        <label class="checkbox-label">
          <input type="checkbox" id="showOverlayCheckbox">
          <span class="checkmark"></span>
          <span data-key="popup.showOverlay">Show Speed Overlay</span>
        </label>
      </div>
      
      <div class="usage-hint">
        <p data-key="popup.usage">Hold trigger key to activate speed playback</p>
      </div>
    </div>
    
    <div class="footer">
      <div class="language-selector">
        <select id="languageSelect">
          <option value="en-US">English</option>
          <option value="zh-CN">中文</option>
        </select>
      </div>
      <button id="settingsBtn" class="settings-btn" data-key="popup.settings">Settings</button>
    </div>
  </div>
  
  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
